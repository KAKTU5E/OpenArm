controller_manager:
  ros__parameters:
    update_rate: 100
    
    joint_state_broadcaster:
      type: "joint_state_broadcaster/JointStateBroadcaster"
    
    arm_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

arm_controller:
   ros__parameters:
      joints:
        - "joint1"
        - "joint2"
        - "joint3"

      command_interfaces:
        - position

      state_interfaces:
        - position
        - velocity

      action_monitor_rate: 20.0

      allow_partial_joints_goal: false
      interpolate_from_desired_state: true
      constraints:
        stopped_velocity_tolerance: 0.01
        goal_time: 0.0
        
        joint1:
          trajectory: 0.05
          goal: 0.03      

        joint2:
          trajectory: 0.05
          goal: 0.03

        joint3:
          trajectory: 0.05
          goal: 0.03